name: Generate JavaDoc

on:
  push:
    branches:
      - main
      - develop
      - hom
  pull_request:
    branches:
      - main
      - develop
      - hom

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate JavaDoc
        run: |
          cd financesb
          mvn clean javadoc:javadoc

      - name: Upload JavaDoc Artifact
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: financesb/target/site/apidocs/

